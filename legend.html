<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>legendary Form</title>
    <link rel="stylesheet" href="style/style.css" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="Home">Home</a></li>
          <li><a href="Contact">Contact</a></li>
          <li><a href="Portfolio">Portfolio</a></li>
          <li><a href="About us">About Us</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section>
        <h2>EFootball Zone</h2>
        <form>
          <label for="name">Your Name :</label>
          <input type="text" name="" id="name" placeholder="Full Name Here" />

          <label for="email">Your Email :</label>
          <input
            type="email"
            name=""
            id="email"
            placeholder="Type Your Email Here"
          />

          <!-- fieldset area -->

          <fieldset>
            <legend>Player Stats</legend>

            <input type="radio" name="football" id="epic" />
            <label for="epic">Epic List</label>

            <input type="radio" name="football" id="standard" />
            <label for="standard">Standard List</label>

            <input type="radio" name="football" id="showtime" />
            <label for="showtime">Showtime List</label>
          </fieldset>
          <!-- fieldset -2 -->

          <fieldset>
            <legend>Big Time Cards</legend>

            <input type="checkbox" name="" id="big" />
            <label for="big">Ankara Messi</label>

            <input type="checkbox" name="" id="small" />
            <label for="small">Gorge</label>
          </fieldset>

          <fieldset>
            <legend>Ideas</legend>
            <textarea name="" id="" cols="50" rows="10"></textarea>
          </fieldset>

          <input type="submit" value="Submit" />
          <input type="reset" value="Reset" />
        </form>
      </section>
    </main>
    <footer>
      <p><small>&copysr; 2026 All rights reserved;</small></p>
    </footer>
  </body>
</html>
