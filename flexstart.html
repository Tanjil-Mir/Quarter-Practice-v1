<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex Starter</title>
    <style>

        .box-container {
            display: flex;
            gap: 2rem;
        }

        .box{
            height: 5rem;
            width: 4rem;
            background-color: seagreen;
            color: gold;
            font-size: 2rem;
            border: 5px solid skyblue;
            text-align: center;
            /* display: flex; */
            /* justify-content: center; */
        }
    </style>
  </head>
  <body>
    <div class="box-container">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
      <div class="box">5</div>
      <div class="box">6</div>
    </div>
  </body>
</html>
